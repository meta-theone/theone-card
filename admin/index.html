<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#242848">
<title>더원 전자명함 · 관리자</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#EEF2F8;--card:#fff;--ink:#222640;--sub:#6A7088;--line:#E5EAF2;--navy:#242848;--blue:#3D6FB4;--blue-dark:#27548F;--soft:#EAF1F9;--danger:#C0392B;--ok:#2E8C73;--warn:#E07B3B;--shadow:0 6px 22px rgba(36,40,72,.10);}
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;}
  .wrap{max-width:980px;margin:0 auto;padding:16px;}
  .login{max-width:400px;margin:6vh auto;background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:30px 26px;}
  .login h1{font-size:19px;margin:0 0 4px;} .login p{color:var(--sub);font-size:13px;margin:0 0 20px;}
  .fld{margin-bottom:12px;} .fld label{display:block;font-size:12px;font-weight:700;color:#454a60;margin-bottom:5px;}
  input,select{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px;font-size:15px;font-family:inherit;outline:none;background:#fff;}
  input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(61,111,180,.15);}
  .btn{width:100%;border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:6px;background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;}
  .btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line);}
  .sep{border:none;border-top:1px solid var(--line);margin:18px 0 14px;}
  .seglab{font-size:12px;font-weight:800;color:var(--sub);margin-bottom:8px;}
  .msg{font-size:12.5px;margin-top:10px;padding:10px;border-radius:9px;display:none;}
  .msg.err{background:#fdeceb;color:var(--danger);display:block;} .msg.ok{background:#eaf6f1;color:var(--ok);display:block;}
  .top{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border-radius:16px;padding:16px 20px;box-shadow:var(--shadow);}
  .top h1{font-size:17px;margin:0;} .top .who{font-size:12px;opacity:.9;margin-top:3px;}
  .top .badge{display:inline-block;background:rgba(255,255,255,.18);padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;margin-left:6px;}
  .top button{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:9px;padding:8px 13px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;}
  .card2{background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:20px;margin-top:14px;}
  .panel-h{font-size:14px;font-weight:800;margin:18px 0 10px;display:flex;align-items:center;gap:8px;}
  .panel-h .cnt{background:var(--warn);color:#fff;font-size:11px;font-weight:800;padding:1px 8px;border-radius:999px;}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0;}
  .stat{background:var(--card);border-radius:13px;padding:14px;box-shadow:var(--shadow);} .stat .n{font-size:22px;font-weight:800;} .stat .l{font-size:11.5px;color:var(--sub);margin-top:2px;}
  .stat .n.w{color:var(--warn);} .stat .n.o{color:var(--ok);}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
  .filters select{width:auto;border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;font-size:13px;font-family:inherit;background:#fff;}
  .filters .sp{flex:1;} .filters button{width:auto;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
  .list{display:flex;flex-direction:column;gap:10px;}
  .item{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:14px 16px;}
  .item .row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .tag{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;}
  .tag.가입{background:#eaf1fb;color:var(--blue-dark);} .tag.보험{background:#eef7f3;color:var(--ok);} .tag.제품{background:#fdf2e9;color:var(--warn);} .tag.테스트{background:#eee;color:#888;}
  .item .nm{font-weight:800;font-size:15px;} .item .ph{color:var(--sub);font-size:13px;}
  .item .when{margin-left:auto;color:#9aa1b2;font-size:11.5px;}
  .item .det{margin-top:8px;font-size:12.5px;color:#3a3e52;background:#f6f8fc;border-radius:9px;padding:9px 11px;white-space:pre-wrap;word-break:break-word;}
  .item .ctl{display:flex;align-items:center;gap:8px;margin-top:10px;}
  .item .ctl .ref{font-size:12px;color:var(--sub);} .item .ctl select{width:auto;margin-left:auto;border:1.5px solid var(--line);border-radius:9px;padding:7px 10px;font-size:12.5px;font-family:inherit;}
  .pend .who2{font-weight:800;font-size:15px;} .pend .em{color:var(--sub);font-size:12.5px;}
  .pend .req{font-size:12px;color:var(--sub);margin-top:2px;}
  .pend .act{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .abtn{border:none;border-radius:9px;padding:8px 12px;font-size:12.5px;font-weight:800;cursor:pointer;font-family:inherit;background:var(--ok);color:#fff;}
  .abtn.blue{background:var(--blue);} .abtn.rej{background:#fff;color:var(--danger);border:1.5px solid #f0c8c4;}
  .empty{text-align:center;color:var(--sub);padding:34px;font-size:14px;}
  .note{font-size:12px;color:var(--sub);margin-top:6px;}
  .hidden{display:none!important;}
</style>
</head>
<body>
<div id="loginView" class="login">
  <h1>더원 전자명함 · 관리자</h1>
  <p>신청 접수 현황을 관리합니다.</p>
  <div class="fld"><label>이메일</label><input type="email" id="email" placeholder="name@email.com" autocomplete="username"></div>
  <div class="fld"><label>비밀번호</label><input type="password" id="pw" placeholder="6자 이상" autocomplete="current-password"></div>
  <button class="btn" id="loginBtn" onclick="doLogin()">로그인</button>
  <hr class="sep">
  <div class="seglab">처음이세요? 아래 정보로 가입 신청 (관리자 승인 후 이용)</div>
  <div class="fld"><label>이름</label><input type="text" id="sname" placeholder="성함"></div>
  <div class="fld"><label>소속 단체</label><select id="sorg"><option value="">단체 선택</option></select></div>
  <button class="btn ghost" id="signupBtn" onclick="doSignup()">계정 만들기 (승인 대기)</button>
  <div class="msg" id="loginMsg"></div>
</div>

<div id="appView" class="wrap hidden">
  <div class="top">
    <div><h1>신청 관리 <span class="badge" id="roleBadge"></span></h1><div class="who" id="whoami"></div></div>
    <button onclick="doLogout()">로그아웃</button>
  </div>

  <div id="pendingView" class="hidden card2">
    <b>승인 대기 중입니다.</b>
    <p style="color:#6A7088;font-size:13px;margin:6px 0 0;">가입 신청이 접수되었습니다. <b>관리자 승인 후</b> 신청 현황을 보실 수 있습니다.<br>승인되면 새로고침 시 바로 열립니다.</p>
  </div>

  <div id="noperm" class="hidden card2">
    <b>권한이 없습니다.</b>
    <p style="color:#6A7088;font-size:13px;margin:6px 0 0;">이 계정(<b id="npEmail"></b>)에 연결된 가입 정보가 없습니다. 로그아웃 후 <b>계정 만들기</b>로 소속 단체를 선택해 다시 신청해 주세요.</p>
  </div>

  <div id="approvePanel" class="hidden">
    <div class="panel-h">승인 대기 <span class="cnt" id="pendCnt">0</span></div>
    <div class="list" id="pendList"></div>
  </div>

  <div id="dash" class="hidden">
    <div class="panel-h" id="dashH">신청 현황</div>
    <div class="stats">
      <div class="stat"><div class="n" id="sTotal">0</div><div class="l">전체</div></div>
      <div class="stat"><div class="n w" id="sWait">0</div><div class="l">대기</div></div>
      <div class="stat"><div class="n" id="sProg">0</div><div class="l">상담중</div></div>
      <div class="stat"><div class="n o" id="sDone">0</div><div class="l">완료</div></div>
    </div>
    <div class="filters">
      <select id="fOrg" class="hidden" onchange="reload()"></select>
      <select id="fType" onchange="render()"><option value="">유형 전체</option><option>가입</option><option>보험</option><option>제품</option></select>
      <select id="fStatus" onchange="render()"><option value="">상태 전체</option><option>대기</option><option>상담중</option><option>완료</option><option>계약</option></select>
      <span class="sp"></span>
      <button onclick="reload()">새로고침</button>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<script>
var SB_URL='https://tynqmbmwvrkjzscvrree.supabase.co';
var SB_KEY='sb_publishable_4XgU_L-7zywgwRfkxtf4tQ_jMkE2Uku';
var sb=window.supabase.createClient(SB_URL,SB_KEY);
var PROFILE=null, ROWS=[], ORGS=[], STATUSES=['대기','상담중','완료','계약'];

function esc(s){return (s||'').replace(/[<>&"]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];});}
function msg(t,cls){var m=document.getElementById('loginMsg');m.textContent=t;m.className='msg '+cls;}
function show(v){ document.getElementById('loginView').classList.toggle('hidden',v!=='login'); document.getElementById('appView').classList.toggle('hidden',v!=='app'); }

async function loadOrgs(){
  var r=await sb.from('organizations').select('id,name').order('name'); ORGS=r.data||[];
  var sel=document.getElementById('sorg');
  sel.innerHTML='<option value="">단체 선택</option>'+ORGS.map(function(o){return '<option value="'+o.id+'">'+esc(o.name)+'</option>';}).join('');
}

async function doSignup(){
  var e=document.getElementById('email').value.trim(), p=document.getElementById('pw').value;
  var name=document.getElementById('sname').value.trim(), org=document.getElementById('sorg').value;
  if(!e||!p)return msg('이메일과 비밀번호를 입력하세요','err');
  if(!name)return msg('이름을 입력하세요','err');
  if(!org)return msg('소속 단체를 선택하세요','err');
  try{ localStorage.setItem('pendingReg', JSON.stringify({name:name,org_id:org})); }catch(x){}
  document.getElementById('signupBtn').disabled=true;
  var r=await sb.auth.signUp({email:e,password:p});
  document.getElementById('signupBtn').disabled=false;
  if(r.error)return msg(r.error.message,'err');
  if(r.data.session){ boot(); }
  else { msg('가입 신청 완료. 메일 확인 후 로그인하면 승인 대기로 등록됩니다.','ok'); }
}
async function doLogin(){
  var e=document.getElementById('email').value.trim(), p=document.getElementById('pw').value;
  if(!e||!p)return msg('이메일과 비밀번호를 입력하세요','err');
  document.getElementById('loginBtn').disabled=true;
  var r=await sb.auth.signInWithPassword({email:e,password:p});
  document.getElementById('loginBtn').disabled=false;
  if(r.error)return msg(r.error.message,'err');
  boot();
}
async function doLogout(){ await sb.auth.signOut(); location.reload(); }

async function ensureProfile(u){
  // 프로필 없으면, 가입 시 저장해둔 정보로 '대기' 프로필 생성
  var pend=null; try{ pend=JSON.parse(localStorage.getItem('pendingReg')||'null'); }catch(x){}
  if(!pend) return null;
  var ins=await sb.from('profiles').insert({id:u.id,email:u.email,name:pend.name,org_id:pend.org_id,role:'pending'});
  try{ localStorage.removeItem('pendingReg'); }catch(x){}
  if(ins.error) return null;
  var pr=await sb.from('profiles').select('*, organizations(name)').eq('id',u.id).maybeSingle();
  return pr.data;
}

async function boot(){
  var sess=(await sb.auth.getSession()).data.session;
  if(!sess){ show('login'); return; }
  show('app');
  var u=sess.user;
  document.getElementById('whoami').textContent=u.email;
  document.getElementById('npEmail').textContent=u.email;
  var pr=await sb.from('profiles').select('*, organizations(name)').eq('id',u.id).maybeSingle();
  PROFILE=pr.data;
  if(!PROFILE){ PROFILE=await ensureProfile(u); }
  // 초기화: 모든 뷰 숨김
  ['pendingView','noperm','approvePanel','dash'].forEach(function(id){document.getElementById(id).classList.add('hidden');});
  if(!PROFILE){ document.getElementById('noperm').classList.remove('hidden'); document.getElementById('roleBadge').textContent='권한없음'; return; }
  if(PROFILE.role==='pending'){ document.getElementById('pendingView').classList.remove('hidden'); document.getElementById('roleBadge').textContent='승인 대기'; if(PROFILE.organizations)document.getElementById('whoami').textContent=u.email+' · '+PROFILE.organizations.name+' (신청)'; return; }
  var roleTxt = PROFILE.role==='super'?'슈퍼관리자(전체)':(PROFILE.role==='org_admin'?'단체관리자':'담당');
  document.getElementById('roleBadge').textContent=roleTxt;
  if(PROFILE.organizations) document.getElementById('whoami').textContent=u.email+' · '+PROFILE.organizations.name;
  if(PROFILE.role==='super'){
    var sel=document.getElementById('fOrg'); sel.classList.remove('hidden');
    sel.innerHTML='<option value="">전체 단체</option>'+ORGS.map(function(o){return '<option value="'+o.id+'">'+esc(o.name)+'</option>';}).join('');
  }
  if(PROFILE.role==='super'||PROFILE.role==='org_admin'){
    document.getElementById('approvePanel').classList.remove('hidden');
    loadPending();
  }
  document.getElementById('dash').classList.remove('hidden');
  reload();
}

async function loadPending(){
  var r=await sb.from('profiles').select('*, organizations(name)').eq('role','pending').order('created_at',{ascending:true});
  var rows=r.data||[];
  document.getElementById('pendCnt').textContent=rows.length;
  var L=document.getElementById('pendList');
  if(!rows.length){ L.innerHTML='<div class="empty">승인 대기 중인 계정이 없습니다.</div>'; return; }
  L.innerHTML=rows.map(function(x){
    var org=x.organizations?x.organizations.name:'(단체미지정)';
    var superBtn=(PROFILE.role==='super')?'<button class="abtn blue" onclick="approve(\''+x.id+'\',\'super\')">전체관리자 승인</button>':'';
    return '<div class="item pend"><div class="who2">'+esc(x.name||'(이름없음)')+'</div>'+
      '<div class="em">'+esc(x.email||'')+'</div>'+
      '<div class="req">신청 단체: '+esc(org)+'</div>'+
      '<div class="act"><button class="abtn" onclick="approve(\''+x.id+'\',\'org_admin\')">단체관리자 승인</button>'+
      superBtn+
      '<button class="abtn rej" onclick="reject(\''+x.id+'\')">거절</button></div></div>';
  }).join('');
}
async function approve(id,role){
  var patch={role:role}; if(role==='super') patch.org_id=null;
  var r=await sb.from('profiles').update(patch).eq('id',id);
  if(r.error){ alert('승인 실패: '+r.error.message); return; }
  loadPending();
}
async function reject(id){
  if(!confirm('이 가입 신청을 거절(삭제)할까요?')) return;
  var r=await sb.from('profiles').delete().eq('id',id);
  if(r.error){ alert('거절 실패: '+r.error.message); return; }
  loadPending();
}

async function reload(){
  var q=sb.from('submissions').select('*, members(name), organizations(name)').order('created_at',{ascending:false});
  if(PROFILE.role==='super'){ var of=document.getElementById('fOrg').value; if(of) q=q.eq('org_id',of); }
  var r=await q; ROWS=r.data||[]; render();
}
function render(){
  var ft=document.getElementById('fType').value, fs=document.getElementById('fStatus').value;
  var rows=ROWS.filter(function(x){return (!ft||x.type===ft)&&(!fs||x.status===fs);});
  var tot=ROWS.length, w=ROWS.filter(function(x){return x.status==='대기';}).length, p=ROWS.filter(function(x){return x.status==='상담중';}).length, dn=ROWS.filter(function(x){return x.status==='완료';}).length;
  document.getElementById('sTotal').textContent=tot; document.getElementById('sWait').textContent=w; document.getElementById('sProg').textContent=p; document.getElementById('sDone').textContent=dn;
  var L=document.getElementById('list');
  if(!rows.length){ L.innerHTML='<div class="empty">표시할 신청이 없습니다.</div>'; return; }
  L.innerHTML=rows.map(function(x){
    var pay=x.payload||{}; var who=pay['성명']||pay['이름']||'(이름없음)'; var ph=pay['휴대폰']||'';
    var det=Object.keys(pay).map(function(k){return k+': '+(typeof pay[k]==='object'?JSON.stringify(pay[k]):pay[k]);}).join('\n');
    var when=new Date(x.created_at).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    var org=x.organizations?x.organizations.name:''; var ref=x.members?x.members.name:'';
    var opts=STATUSES.map(function(s){return '<option'+(s===x.status?' selected':'')+'>'+s+'</option>';}).join('');
    return '<div class="item"><div class="row1"><span class="tag '+esc(x.type)+'">'+esc(x.type)+'</span>'+
      '<span class="nm">'+esc(who)+'</span><span class="ph">'+esc(ph)+'</span><span class="when">'+esc(org? org+' · ':'')+when+'</span></div>'+
      (det?'<div class="det">'+esc(det)+'</div>':'')+
      '<div class="ctl"><span class="ref">추천인: '+esc(ref||'-')+'</span>'+
      '<select onchange="setStatus(\''+x.id+'\',this.value)">'+opts+'</select></div></div>';
  }).join('');
}
async function setStatus(id,st){
  var r=await sb.from('submissions').update({status:st}).eq('id',id);
  if(r.error){ alert('변경 실패: '+r.error.message); return; }
  var it=ROWS.find(function(x){return x.id===id;}); if(it) it.status=st; render();
}

loadOrgs();
boot();
</script>
</body>
</html>
