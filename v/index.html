<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#242848">
<title>전자명함</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#EEF2F8; --card:#FFFFFF; --ink:#222640; --sub:#6A7088; --line:#E5EAF2;
    --navy:#242848; --blue:#3D6FB4; --blue-dark:#27548F; --cyan:#62B6DA; --soft:#EAF1F9; --danger:#C0392B;
    --shadow:0 10px 30px rgba(36,40,72,.12); --shadow-sm:0 3px 12px rgba(36,40,72,.08); --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;font-size:15px;-webkit-font-smoothing:antialiased;}
  .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:80px;overflow:hidden;}
  svg{display:block;} .ic{width:20px;height:20px;fill:currentColor;} .ic-sm{width:18px;height:18px;fill:currentColor;}
  .hero{position:relative;padding:18px 22px 26px;color:#fff;overflow:hidden;background:linear-gradient(155deg,#222648 0%,#2E4F8C 52%,#3E7AB4 100%);}
  .hero .bub{position:absolute;border-radius:50%;}
  .hero .b1{width:180px;height:180px;top:-60px;right:-40px;background:rgba(255,255,255,.08);}
  .hero .b2{width:120px;height:120px;bottom:-50px;left:-30px;background:rgba(98,182,218,.16);}
  .hero-top{position:relative;display:flex;align-items:center;justify-content:space-between;z-index:2;}
  .wordmark{display:flex;align-items:center;gap:8px;font-weight:800;letter-spacing:.5px;font-size:14px;}
  .wordmark .dot{width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 0 4px rgba(98,182,218,.25);}
  .wordmark small{display:block;font-size:9.5px;font-weight:600;opacity:.8;letter-spacing:1.5px;margin-top:1px;}
  .hero-id{position:relative;z-index:2;display:flex;align-items:center;gap:16px;margin-top:18px;}
  .avatar{width:84px;height:84px;border-radius:24px;flex:none;background:rgba(255,255,255,.92) center/cover no-repeat;color:var(--navy);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;box-shadow:0 6px 18px rgba(0,0,0,.22);}
  .hero-id h1{margin:0;font-size:25px;letter-spacing:-.5px;line-height:1.1;}
  .hero-id .role{font-size:14px;font-weight:700;color:#CFE0F2;margin-top:3px;}
  .hero-id .org{font-size:12.5px;opacity:.92;margin-top:5px;}
  .hero-id .fed{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11px;font-weight:700;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:999px;}
  .hero-id .fed .d{width:6px;height:6px;border-radius:50%;background:var(--cyan);}
  .tabs{position:sticky;top:0;z-index:20;background:rgba(238,242,248,.95);backdrop-filter:saturate(180%) blur(10px);display:flex;gap:4px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--line);}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:none;border:none;background:transparent;color:var(--sub);padding:9px 15px;border-radius:999px;font-size:13.5px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}
  .tab.active{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;box-shadow:0 4px 12px rgba(61,111,180,.3);}
  .panel{display:none;padding:16px 16px 22px;animation:fade .25s ease;} .panel.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
  .card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:8px 18px;}
  .crow{display:flex;align-items:center;gap:14px;padding:14px 2px;border-bottom:1px solid var(--line);color:inherit;text-decoration:none;} .crow:last-child{border-bottom:none;}
  .crow .ci{width:42px;height:42px;border-radius:13px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--soft);color:var(--blue-dark);}
  .crow .ct{min-width:0;} .crow .ct .lab{font-size:11px;color:var(--sub);font-weight:600;} .crow .ct .val{font-size:15.5px;font-weight:700;word-break:break-all;color:var(--ink);}
  .crow .go{margin-left:auto;color:#C2CAD8;flex:none;} .crow.addr .ci{background:#E9F4F1;color:#2E8C73;}
  .savebtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:14px;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;color:#fff;background:linear-gradient(135deg,var(--blue),var(--blue-dark));box-shadow:0 8px 20px rgba(43,84,140,.28);}
  .sec{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:20px;margin-bottom:14px;}
  .eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.5px;color:var(--blue);background:var(--soft);padding:4px 11px;border-radius:999px;margin-bottom:10px;}
  .eyebrow .d{width:6px;height:6px;border-radius:50%;background:var(--blue);}
  .sec h2{margin:0 0 6px;font-size:17px;letter-spacing:-.3px;} .sec .lead{color:var(--sub);font-size:13px;margin:0 0 14px;}
  .seg{display:flex;align-items:center;gap:8px;margin:18px 0 4px;} .seg .bar{width:4px;height:15px;border-radius:2px;background:var(--blue);} .seg b{font-size:12.5px;color:var(--sub);}
  .benefit{display:flex;gap:9px;font-size:13.5px;padding:7px 0;color:#3a3e52;} .benefit svg{flex:none;color:var(--blue);margin-top:2px;}
  .prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .pcard{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  .pimg{aspect-ratio:1/1;overflow:hidden;background:linear-gradient(135deg,#dbe6f4,#eef2f8);display:flex;align-items:center;justify-content:center;color:var(--blue-dark);font-weight:800;font-size:13px;text-align:center;padding:8px;}
  .pimg img{width:100%;height:100%;object-fit:cover;display:block;}
  .pcard .pn{font-size:13.5px;font-weight:800;padding:10px 12px 1px;} .pcard .pd{font-size:11.5px;color:var(--sub);padding:0 12px 12px;line-height:1.4;}
  label.fld{display:block;margin-top:14px;} label.fld .l{font-size:12.5px;font-weight:700;color:#454a60;margin-bottom:6px;display:block;} label.fld .l .req{color:var(--danger);}
  input[type=text],input[type=tel],input[type=email],textarea,select{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px;font-size:15px;font-family:inherit;color:var(--ink);background:#fff;outline:none;}
  input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(61,111,180,.15);} textarea{resize:vertical;min-height:80px;}
  .opt-group{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
  .opt{display:flex;align-items:flex-start;gap:11px;border:1.5px solid var(--line);border-radius:13px;padding:12px 14px;cursor:pointer;font-size:13.5px;} .opt.sel{border-color:var(--blue);background:#F3F8FD;}
  .opt input{margin-top:2px;accent-color:var(--blue);flex:none;} .opt .od{font-size:12px;color:var(--sub);margin-top:2px;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;} .chip{border:1.5px solid var(--line);border-radius:999px;padding:9px 15px;font-size:13px;cursor:pointer;background:#fff;font-family:inherit;} .chip.sel{background:var(--blue);color:#fff;border-color:var(--blue);}
  .btn{display:block;width:100%;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:18px;}
  .btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;box-shadow:0 8px 20px rgba(43,84,140,.25);} .btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line);}
  .btn-row{display:flex;gap:9px;} .btn-row .btn{margin-top:0;}
  .bankbox{background:#F3F8FD;border:1px solid #d9e6f4;border-radius:13px;padding:14px;margin-top:14px;font-size:13px;} .bankbox b{color:var(--blue-dark);}
  .note{font-size:12px;color:var(--sub);margin-top:12px;line-height:1.5;}
  .actionbar{position:fixed;left:0;right:0;bottom:0;z-index:40;max-width:480px;margin:0 auto;background:rgba(255,255,255,.97);backdrop-filter:saturate(180%) blur(12px);border-top:1px solid var(--line);display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom));}
  .ab{flex:1;border:none;background:transparent;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:4px;padding:5px 2px;color:var(--sub);font-size:10.5px;font-weight:700;}
  .ab .abi{width:42px;height:42px;border-radius:13px;background:var(--soft);color:var(--blue-dark);display:flex;align-items:center;justify-content:center;} .ab.primary .abi{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;}
  .sheet-bg{position:fixed;inset:0;background:rgba(20,24,44,.5);z-index:50;display:none;align-items:flex-end;justify-content:center;} .sheet-bg.open{display:flex;}
  .sheet{background:#fff;width:100%;max-width:480px;border-radius:22px 22px 0 0;padding:18px 18px calc(22px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;animation:up .28s ease;}
  @keyframes up{from{transform:translateY(100%);}to{transform:none;}}
  .grab{width:42px;height:4px;border-radius:2px;background:#d7dce6;margin:0 auto 14px;} .sheet h3{margin:0 0 16px;font-size:17px;}
  .qr-wrap{display:flex;flex-direction:column;align-items:center;gap:13px;} #qrcode{padding:16px;background:#fff;border:1px solid var(--line);border-radius:18px;} #qrcode img{display:block;}
  .share-name{font-weight:800;font-size:17px;} .share-sub{color:var(--sub);font-size:13px;margin-top:-7px;text-align:center;}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:12px 20px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:.25s;z-index:60;max-width:90%;text-align:center;} .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .loading{display:flex;align-items:center;justify-content:center;height:100vh;color:var(--sub);font-size:14px;}
  .hidden{display:none!important;}
</style>
</head>
<body>
<div class="app" id="app"><div class="loading" id="loading">명함을 불러오는 중…</div><div id="content" class="hidden"></div></div>

<div class="sheet-bg" id="shareSheet" onclick="if(event.target===this)closeSheet('shareSheet')">
  <div class="sheet"><div class="grab"></div><h3>명함 공유</h3>
    <div class="qr-wrap"><div id="qrcode"></div><div class="share-name" id="shareName"></div><div class="share-sub">스캔하면 이 명함이 열립니다</div>
      <div class="btn-row" style="width:100%;"><button class="btn btn-ghost" onclick="saveVCard()">연락처 저장</button><button class="btn btn-primary" onclick="shareNative()">공유하기</button></div>

    </div>

</div>

<script>
var SB_URL='https://tynqmbmwvrkjzscvrree.supabase.co';
var SB_KEY='sb_publishable_4XgU_L-7zywgwRfkxtf4tQ_jMkE2Uku';

};
var ORG=null, MEMBER=null, PRODUCTS=[];
function qp(k,d){var v=new URLSearchParams(location.search).get(k);return v||d;}
function esc(s){return (s||'').replace(/[<>&"]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];});}
function clean(p){return (p||'').replace(/[^0-9+]/g,'');}
function initial(n){return (n||'?').trim().charAt(0)||'?';}

async function init(){
  var o=qp('o','scf'), m=qp('m','kgw');
  try{
    var orgRes=await sb.from('organizations').select('*').eq('slug',o).maybeSingle();
    if(orgRes.error) throw orgRes.error;
    ORG=orgRes.data;
    if(!ORG){ return fail('단체를 찾을 수 없습니다 ('+o+')'); }
    var memRes=await sb.from('members').select('*').eq('org_id',ORG.id).eq('slug',m).maybeSingle();
    if(memRes.error) throw memRes.error;
    MEMBER=memRes.data;
    if(!MEMBER){ return fail('명함을 찾을 수 없습니다 ('+m+')'); }
    var prodRes=await sb.from('products').select('*').eq('org_id',ORG.id).order('sort');
    PRODUCTS=prodRes.data||[];
    render();
  }catch(e){ fail('불러오기 오류: '+(e.message||e)); }
}
function fail(msg){ document.getElementById('loading').textContent=msg; }

  '<section class="panel active"><div class="card" id="contactList"></div>'+

    '<p class="note">아래 바에서 전화·문자·이메일·QR 공유가 됩니다.</p></section>'+
  '<section class="panel"><div class="sec"><span class="eyebrow"><span class="d"></span>회사소개</span><h2>'+esc(ORG.name)+'</h2>'+
    '<p class="lead">'+esc(ORG.intro||'')+'</p></div>'+
    '<div class="sec"><span class="eyebrow"><span class="d"></span>제품 안내</span><h2>주요 제품</h2>'+
    '<div class="prod-grid">'+PRODUCTS.map(function(p){

      '<label class="opt sel"><input type="radio" name="member" value="창업회원 20만원" checked><div><b>창업회원 · 200,000원</b></div></label>'+
      '<label class="opt"><input type="radio" name="member" value="창업회원 40만원(+여행바우처)"><div><b>창업회원 · 400,000원</b><div class="od">+여행바우처</div></div></label>'+
      '<label class="opt"><input type="radio" name="member" value="일반회원(무료)"><div><b>일반회원 · 무료</b></div></label></div>'+
    '<div class="seg"><span class="bar"></span><b>추가 구입 희망 제품(선택)</b></div>'+
    '<div class="chips" id="buyChips"><button type="button" class="chip" data-buy="양자제조기 세트">양자제조기 세트</button><button type="button" class="chip" data-buy="저주파시계 세트">저주파시계 세트</button></div>'+
    '<div class="bankbox">입금 계좌 · <b>'+esc(ORG.bank_info||'')+'</b></div>'+
    '<label class="opt" style="margin-top:14px;"><input type="checkbox" id="joinAgree"><div><b>개인정보 수집·이용 동의 <span class="req">*</span></b></div></label>'+
    '<button class="btn btn-primary" onclick="submitJoin(this)">가입 신청하기</button></form></div></section>'+
  '<section class="panel"><div class="sec"><span class="eyebrow"><span class="d"></span>보험 상담신청</span><h2>제휴 보험 상담</h2>'+
    '<p class="lead">신청하면 명함 주인(상담 담당)에게 전달됩니다.</p>'+
    '<form id="consultForm" onsubmit="return false;">'+
    '<label class="fld"><span class="l">이름 <span class="req">*</span></span><input type="text" name="name" placeholder="홍길동"></label>'+
    '<label class="fld"><span class="l">휴대폰 <span class="req">*</span></span><input type="tel" name="phone" placeholder="010-0000-0000"></label>'+
    '<div class="seg"><span class="bar"></span><b>성별</b></div><div class="chips" data-single="gender"><button type="button" class="chip sel" data-g="남">남</button><button type="button" class="chip" data-g="여">여</button></div>'+
    '<label class="fld"><span class="l">상담 내용</span><textarea name="memo" placeholder="관심 분야(보장분석, 자동차, 상조 등)"></textarea></label>'+
    '<label class="opt" style="margin-top:14px;"><input type="checkbox" id="consultAgree"><div><b>개인정보 수집·이용 동의 <span class="req">*</span></b></div></label>'+
    '<button class="btn btn-primary" onclick="submitConsult(this)">상담 신청하기</button></form>'+
    '<p class="note">제휴 보험은 상담 시 설계 기준으로 안내됩니다.</p></div></section>';
  var content=document.getElementById('content');
  content.innerHTML=html; content.classList.remove('hidden');
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('actionbar').classList.remove('hidden');
  if(c.photo_url){var hp=document.getElementById('heroPhoto');hp.style.backgroundImage='url('+c.photo_url+')';}
  document.title=c.name+' · '+ORG.name+' 전자명함';
  renderContacts(); bindOptionUI();
}
function renderContacts(){
  var c=MEMBER, rows=[];
  if(c.phone) rows.push(crow('tel:'+clean(c.phone),ICON.phone,'휴대폰',c.phone));
  if(c.tel) rows.push(crow('tel:'+clean(c.tel),ICON.work,'회사 전화',c.tel));
  if(c.fax) rows.push(crow('',ICON.fax,'Fax',c.fax));
  if(c.email) rows.push(crow('mailto:'+c.email,ICON.mail,'이메일',c.email));
  if(c.address) rows.push('<a class="crow addr" href="https://map.kakao.com/?q='+encodeURIComponent(c.address)+'" target="_blank" rel="noopener"><span class="ci">'+ICON.map+'</span><span class="ct"><span class="lab">주소 (지도 열기)</span><span class="val">'+esc(c.address)+'</span></span><span class="go">'+ICON.chev+'</span></a>');
  if(!rows.length) rows.push('<div style="padding:20px;text-align:center;color:#6A7088;font-size:13px;">등록된 연락처가 없습니다</div>');
  document.getElementById('contactList').innerHTML=rows.join('');
}
function crow(href,icon,lab,val){var inner='<span class="ci">'+icon+'</span><span class="ct"><span class="lab">'+lab+'</span><span class="val">'+esc(val)+'</span></span>'+(href?'<span class="go">'+ICON.chev+'</span>':'');return href?'<a class="crow" href="'+href+'">'+inner+'</a>':'<div class="crow">'+inner+'</div>';}
function go(i,el){var ps=document.querySelectorAll('.panel');for(var k=0;k<ps.length;k++)ps[k].classList.toggle('active',k===i);var ts=document.querySelectorAll('.tab');for(var j=0;j<ts.length;j++)ts[j].classList.remove('active');el.classList.add('active');try{window.scrollTo({top:0,behavior:'smooth'});}catch(e){}}

function callOwner(t){var c=MEMBER;if(t==='tel'){if(!c.phone&&!c.tel)return toast('전화번호가 없습니다');location.href='tel:'+clean(c.phone||c.tel);}if(t==='sms'){if(!c.phone)return toast('휴대폰 번호가 없습니다');location.href='sms:'+clean(c.phone);}if(t==='mail'){if(!c.email)return toast('이메일이 없습니다');location.href='mailto:'+c.email;}}
function vcard(){var c=MEMBER;var L=['BEGIN:VCARD','VERSION:3.0','N:;'+(c.name||'')+';;;','FN:'+(c.name||'')];if(c.company)L.push('ORG:'+c.company);if(c.title)L.push('TITLE:'+c.title);if(c.phone)L.push('TEL;TYPE=CELL:'+c.phone);if(c.tel)L.push('TEL;TYPE=WORK:'+c.tel);if(c.fax)L.push('TEL;TYPE=FAX:'+c.fax);if(c.email)L.push('EMAIL;TYPE=INTERNET:'+c.email);if(c.address)L.push('ADR;TYPE=WORK:;;'+c.address+';;;;');L.push('URL:'+location.href);L.push('NOTE:'+ORG.name);L.push('END:VCARD');return L.join('\r\n');}
function saveVCard(){var b=new Blob([vcard()],{type:'text/vcard;charset=utf-8'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=(MEMBER.name||'명함')+'.vcf';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},800);toast('연락처를 저장했습니다');}
function openShare(){document.getElementById('shareName').textContent=MEMBER.name+(MEMBER.title?' '+MEMBER.title:'');openSheet('shareSheet');var box=document.getElementById('qrcode');box.innerHTML='';if(window.QRCode){try{new QRCode(box,{text:location.href,width:190,height:190,correctLevel:QRCode.CorrectLevel.M});}catch(e){box.innerHTML='<div class="note" style="padding:30px;">QR 생성 실패</div>';}}else{box.innerHTML='<div class="note" style="padding:30px;text-align:center;">QR은 인터넷 연결 시 표시됩니다.</div>';}}
function shareNative(){if(navigator.share){navigator.share({title:MEMBER.name+' 명함',url:location.href}).catch(function(){});}else copyLink();}
function copyLink(){copy(location.href,'링크가 복사되었습니다');}

function radio(n){var el=document.querySelector('input[name="'+n+'"]:checked');return el?el.value:'';}
function fval(f,n){var el=f.elements[n];return el?el.value.trim():'';}
async function saveSubmission(type,payload,btn){
  btn.disabled=true; var old=btn.textContent; btn.textContent='전송 중…';
  try{
    var r=await sb.from('submissions').insert({org_id:ORG.id,member_id:MEMBER.id,type:type,payload:payload});
    if(r.error) throw r.error;
    toast('신청이 접수되었습니다. 곧 연락드리겠습니다.');
    return true;
  }catch(e){ toast('전송 실패: '+(e.message||e)); btn.disabled=false; btn.textContent=old; return false; }
}
async function submitJoin(btn){
  var f=document.getElementById('joinForm');
  var name=fval(f,'name'),phone=fval(f,'phone');
  if(!name)return toast('성명을 입력하세요'); if(!phone)return toast('휴대폰을 입력하세요');
  if(!document.getElementById('joinAgree').checked)return toast('개인정보 동의가 필요합니다');
  var buys=[];document.querySelectorAll('#buyChips .chip.sel').forEach(function(c){buys.push(c.getAttribute('data-buy'));});
  var payload={성명:name,생년월일:fval(f,'birth'),휴대폰:phone,주소:fval(f,'addr'),회원유형:radio('member'),추가구입:buys.join(', '),추천인:MEMBER.name};
  if(await saveSubmission('가입',payload,btn)){ f.reset(); document.querySelectorAll('#buyChips .chip').forEach(function(c){c.classList.remove('sel');}); }
}
async function submitConsult(btn){
  var f=document.getElementById('consultForm');
  var name=fval(f,'name'),phone=fval(f,'phone');
  if(!name)return toast('이름을 입력하세요'); if(!phone)return toast('휴대폰을 입력하세요');
  if(!document.getElementById('consultAgree').checked)return toast('개인정보 동의가 필요합니다');
  var g=document.querySelector('[data-single="gender"] .chip.sel');
  var payload={이름:name,휴대폰:phone,성별:g?g.getAttribute('data-g'):'',상담내용:fval(f,'memo'),담당:MEMBER.name};
  if(await saveSubmission('보험',payload,btn)){ f.reset(); }
}
function bindOptionUI(){
  document.querySelectorAll('.opt-group').forEach(function(grp){grp.addEventListener('change',function(){grp.querySelectorAll('.opt').forEach(function(o){o.classList.toggle('sel',o.querySelector('input').checked);});});});
  document.querySelectorAll('#buyChips .chip').forEach(function(c){c.addEventListener('click',function(){c.classList.toggle('sel');});});
  document.querySelectorAll('[data-single="gender"] .chip').forEach(function(c){c.addEventListener('click',function(){document.querySelectorAll('[data-single="gender"] .chip').forEach(function(x){x.classList.remove('sel');});c.classList.add('sel');});});
}
function openSheet(id){document.getElementById(id).classList.add('open');}
function closeSheet(id){document.getElementById(id).classList.remove('open');}
var toastT;function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},2400);}
function copy(text,msg){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){toast(msg||'복사되었습니다');}).catch(fb);}else fb();function fb(){var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast(msg||'복사되었습니다');}catch(e){}ta.remove();}}

init();
</script>
</body>
</html>
