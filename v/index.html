<style>

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;background:var(--navy);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;}
  .app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--navy);}
  .loading{display:flex;align-items:center;justify-content:center;height:100vh;color:#8893a7;font-size:14px;}
  svg{display:block}
  .hero{padding:20px 18px 22px;}
  .orgrow{display:flex;align-items:center;gap:10px;}
  .orglogo{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#9ec3ff;flex:none;overflow:hidden;}
  .orglogo img{width:100%;height:100%;object-fit:cover}
  .orgrow .on{font-size:14px;font-weight:600;color:#fff;line-height:1.2}
  .orgrow .ot{font-size:11px;color:#7e8aa3}
  .mcard{background:#fff;border-radius:20px;margin-top:15px;padding:18px;box-shadow:0 16px 38px rgba(0,0,0,.34);position:relative;overflow:hidden;}
  .mcard .bar{position:absolute;top:0;left:0;right:0;height:4px;background:var(--brand);}
  .mtop{display:flex;justify-content:space-between;align-items:flex-start;margin-top:3px;}
  .mlabel{font-size:11px;font-weight:600;color:var(--brand);letter-spacing:.6px;}
  .qrbtn{border:1px solid var(--line);background:#fff;border-radius:11px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);}
  .prof{display:flex;align-items:center;gap:14px;margin-top:8px;}
  .ava{width:66px;height:66px;border-radius:18px;background:#EEF3FB center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:var(--brand);flex:none;font-size:26px;font-weight:700;}
  .pname{font-size:22px;font-weight:700;color:var(--ink);line-height:1.2;}
  .ptitle{font-size:13px;color:var(--brand);font-weight:600;margin-top:3px;}
  .porg{font-size:12.5px;color:var(--sub);margin-top:1px;}
  .pintro{font-size:12.5px;color:var(--sub);margin-top:13px;line-height:1.55;border-top:1px solid #F1F3F7;padding-top:11px;}
  .qa{display:flex;gap:9px;margin-top:16px;}
  .qbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:15px;padding:13px 4px;color:#c8d6ee;cursor:pointer;font-family:inherit;}
  .qbtn svg{width:22px;height:22px;color:#9ec3ff;}
  .qbtn span{font-size:12px;}
  .body{background:var(--bg2);border-radius:22px 22px 0 0;padding:16px 16px 30px;margin-top:6px;}
  .sec{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;}
  .sec h3{margin:0 0 9px;font-size:15px;font-weight:600;color:var(--ink);}
  .crow{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid #F1F3F7;color:inherit;text-decoration:none;}
  .crow:first-of-type{border-top:none;}
  .crow .ci{width:38px;height:38px;border-radius:11px;background:#EEF3FB;color:var(--brand);display:flex;align-items:center;justify-content:center;flex:none;}
  .crow .ci svg{width:19px;height:19px;}
  .crow .lab{font-size:11px;color:var(--sub);} .crow .val{font-size:14.5px;font-weight:600;color:var(--ink);word-break:break-all;}
  .pgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px;}
  .pc{border:1px solid #EEF1F5;border-radius:14px;overflow:hidden;background:#fff;}
  .pcimg{aspect-ratio:16/11;background:#F4F7FB;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .pcimg img{width:100%;height:100%;object-fit:cover;} .pcimg svg{width:30px;height:30px;color:var(--brand);}
  .pc .pn{font-size:13px;font-weight:600;color:var(--ink);padding:9px 11px 0;}
  .pc .pd{font-size:11px;color:var(--sub);padding:2px 11px 9px;line-height:1.4;}
  .pc{cursor:pointer;} .pc .pmore{font-size:11.5px;font-weight:700;color:var(--brand);padding:0 11px 11px;}
  .psheet-img{width:100%;aspect-ratio:16/11;border-radius:14px;background:#F4F7FB;overflow:hidden;margin-bottom:14px;display:flex;align-items:center;justify-content:center;}
  .psheet-img img{width:100%;height:100%;object-fit:cover;} .psheet-img svg{width:42px;height:42px;color:var(--brand);}
  .pc .pb{margin:0 11px 11px;border:1px solid var(--brand);color:var(--brand);background:#fff;border-radius:9px;padding:7px;font-size:12px;cursor:pointer;font-family:inherit;width:calc(100% - 22px);}
  .ex{border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;background:#fff;}
  .exh{display:flex;align-items:center;gap:11px;padding:14px 15px;cursor:pointer;}
  .exh .lead{width:20px;height:20px;color:var(--brand);flex:none;}
  .exh .tt{font-size:14px;font-weight:600;color:var(--ink);} .exh .ts{font-size:11.5px;color:#9aa3b2;}
  .exh .ch{width:18px;height:18px;color:#9aa3b2;margin-left:auto;transition:.2s;}
  .exb{display:none;padding:0 15px 15px;}
  .fld{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff;margin-top:8px;outline:none;}
  .fld:focus{border-color:var(--brand);}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px;}
  .chip{border:1px solid var(--line);border-radius:999px;padding:7px 12px;font-size:12.5px;background:#fff;color:#4B5563;cursor:pointer;}
  .chip.on{background:var(--brand);color:#fff;border-color:var(--brand);}
  .agree{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--sub);margin-top:10px;}
  .flab{font-size:11.5px;color:var(--sub);font-weight:600;margin:11px 0 2px;}
  select.fld{appearance:none;-webkit-appearance:none;background:#fff;}
  .bankinfo{font-size:11.5px;color:#4B5563;background:#F4F7FB;border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-top:10px;}
  .bankinfo b{color:var(--ink);}
  .cta{width:100%;border:none;border-radius:11px;padding:13px;font-size:14.5px;font-weight:600;color:#fff;background:var(--brand);margin-top:12px;cursor:pointer;font-family:inherit;}
  .mgr{text-align:center;margin-top:8px;font-size:11.5px;color:#9aa3b2;}
  .mgr b{color:#4B5563;font-weight:600;}
  .sheet-bg{position:fixed;inset:0;background:rgba(8,12,24,.6);z-index:50;display:none;align-items:center;justify-content:center;padding:24px;}
  .sheet-bg.open{display:flex;}
  .sheet{background:#fff;border-radius:20px;padding:22px;max-width:320px;width:100%;text-align:center;}
  .sheet h4{margin:0 0 4px;font-size:16px;font-weight:600;} .sheet p{margin:0 0 14px;font-size:12.5px;color:var(--sub);}
  #qrbox{display:inline-block;padding:14px;border:1px solid var(--line);border-radius:14px;} #qrbox img{display:block;}
  .sheet .row{display:flex;gap:8px;margin-top:14px;}
  .sheet .row button{flex:1;border-radius:10px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--line);background:#fff;color:var(--ink);}
  .sheet .row button.p{background:var(--brand);color:#fff;border:none;}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#111827;color:#fff;padding:12px 20px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .hidden{display:none!important;}
</style>
</head>

 var body='';
 if(id==='join')body='<div class="flab">성명 *</div><input class="fld f-name" placeholder="홍길동"><div class="flab">생년월일</div><input class="fld f-birth" placeholder="예: 1980-01-01" inputmode="numeric"><div class="flab">휴대폰 *</div><input class="fld f-phone" placeholder="010-0000-0000" inputmode="tel"><div class="flab">이메일</div><input class="fld f-email" placeholder="name@email.com"><div class="flab">택배 주소</div><input class="fld f-addr" placeholder="택배 받으실 주소"><div class="flab">추천인</div><input class="fld f-ref" placeholder="추천인 성명"><div class="flab">회원 유형</div><select class="fld f-member"><option>창업회원 · 200,000원</option><option>창업회원 · 400,000원 (+여행바우처)</option><option>일반회원 · 무료</option></select><div class="flab">구성 선택 <span style="color:#9aa3b2;font-weight:400">(창업회원)</span></div><select class="fld f-combo"><option>선택1 · 신미생물효소수 1Box + 다이아몬드 목걸이</option><option>선택2 · 어싱 미네랄 매트 + 다이아몬드 목걸이</option></select><div class="flab">추가 구입 (선택)</div><div class="chips" data-buy=""><span class="chip" data-v="양자제조기 + 미생물효소수 5박스">양자제조기 세트</span><span class="chip" data-v="저주파시계 + 미생물효소수 3박스">저주파시계 세트</span></div><div class="flab">등록 방법</div><select class="fld f-pay"><option>카드</option><option>계좌이체</option><option>현금</option></select><div class="bankinfo">입금계좌 · 세계창업연맹㈜ 기업은행 <b>486-075164-01-011</b></div><label class="agree"><input type="checkbox" class="f-agree">개인정보 수집·이용 동의</label><button class="cta" onclick="submitForm(\'가입\',\''+id+'\',this)">신청 보내기</button>';
 if(id==='prod')body='<select class="fld f-prod"><option value="">제품 선택</option>'+PRODUCTS.map(function(p){return '<option>'+esc(p.name)+'</option>';}).join('')+'</select><input class="fld f-name" placeholder="이름"><input class="fld f-phone" placeholder="연락처"><label class="agree"><input type="checkbox" class="f-agree">개인정보 수집·이용 동의</label><button class="cta" onclick="submitForm(\'제품\',\''+id+'\',this)">신청 보내기</button>';
 if(id==='ins')body='<input class="fld f-name" placeholder="이름"><input class="fld f-phone" placeholder="연락처"><input class="fld f-birth" placeholder="생년월일 또는 연령대"><div class="chips" data-g>'+['건강·실손','암·진단','연금·저축','종신'].map(function(x){return '<span class="chip" data-v="'+x+'">'+x+'</span>';}).join('')+'</div><textarea class="fld f-memo" placeholder="상담 요청 내용" style="min-height:54px"></textarea><label class="agree"><input type="checkbox" class="f-agree">개인정보 수집·이용 동의</label><button class="cta" onclick="submitForm(\'보험\',\''+id+'\',this)">상담 신청</button>';
 return '<div class="ex" id="ex-'+id+'"><div class="exh" onclick="toggleEx(\''+id+'\')"><span class="lead">'+icon+'</span><div style="flex:1"><div class="tt">'+t+'</div><div class="ts">'+s+'</div></div><span class="ch">'+I.chev+'</span></div><div class="exb">'+body+'</div></div>';
}
function toggleEx(id){var ex=document.getElementById('ex-'+id),b=ex.querySelector('.exb'),ch=ex.querySelector('.ch');var open=b.style.display==='block';b.style.display=open?'none':'block';ch.style.transform=open?'none':'rotate(180deg)';}
function openForm(kind,prod){var id=kind==='제품'?'prod':(kind==='보험'?'ins':'join');var ex=document.getElementById('ex-'+id);if(ex){ex.querySelector('.exb').style.display='block';ex.querySelector('.ch').style.transform='rotate(180deg)';if(prod){var sel=ex.querySelector('.f-prod');if(sel){sel.value=prod;}}ex.scrollIntoView({behavior:'smooth',block:'center'});}}
function bindForms(){document.querySelectorAll('[data-g] .chip').forEach(function(c){c.addEventListener('click',function(){var g=c.parentNode;g.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on')});c.classList.add('on');});});document.querySelectorAll('[data-buy] .chip').forEach(function(c){c.addEventListener('click',function(){c.classList.toggle('on');});});var rf=document.querySelector('#ex-join .f-ref');if(rf&&!rf.value&&MEMBER){rf.value=MEMBER.name||'';}}

function callOwner(t){var c=MEMBER;if(t==='tel'){if(!c.phone&&!c.tel)return toast('전화번호가 없습니다');location.href='tel:'+clean(c.phone||c.tel);}if(t==='sms'){if(!c.phone)return toast('휴대폰 번호가 없습니다');location.href='sms:'+clean(c.phone);}}
function kakaoShare(){if(navigator.share){navigator.share({title:MEMBER.name+' 전자명함',text:'상담 문의드립니다.',url:location.href}).catch(function(){});}else{copyLink();toast('링크 복사됨 — 카톡에 붙여넣기');}}
function vcard(){var c=MEMBER;var L=['BEGIN:VCARD','VERSION:3.0','N:;'+(c.name||'')+';;;','FN:'+(c.name||'')];if(c.company)L.push('ORG:'+c.company);if(c.title)L.push('TITLE:'+c.title);if(c.phone)L.push('TEL;TYPE=CELL:'+c.phone);if(c.tel)L.push('TEL;TYPE=WORK:'+c.tel);if(c.email)L.push('EMAIL;TYPE=INTERNET:'+c.email);if(c.address)L.push('ADR;TYPE=WORK:;;'+c.address+';;;;');L.push('URL:'+location.href);L.push('NOTE:'+ORG.name);L.push('END:VCARD');return L.join('\r\n');}
function saveVCard(){var b=new Blob([vcard()],{type:'text/vcard;charset=utf-8'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=(MEMBER.name||'명함')+'.vcf';document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},800);toast('연락처를 저장했습니다');}
function openQR(){document.getElementById('qrName').textContent=MEMBER.name+' 명함';var box=document.getElementById('qrbox');box.innerHTML='';if(window.QRCode){try{new QRCode(box,{text:location.href,width:188,height:188,correctLevel:QRCode.CorrectLevel.M});}catch(e){box.innerHTML='QR 생성 실패';}}document.getElementById('qrsheet').classList.add('open');}
function closeQR(){document.getElementById('qrsheet').classList.remove('open');}
function openProd(i){var p=PRODUCTS[i];if(!p)return;var src=p.image_url||PRODIMG[p.name]||'';document.getElementById('prodName').textContent=p.name;document.getElementById('prodDesc').textContent=p.description||'';var im=document.getElementById('prodImg');im.innerHTML=src?'<img src="'+esc(src)+'" alt="">':I.box;document.getElementById('prodApply').onclick=function(){closeProd();openForm('제품',p.name);};document.getElementById('prodsheet').classList.add('open');}
function closeProd(){document.getElementById('prodsheet').classList.remove('open');}
function copyLink(){var t=location.href;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){toast('링크가 복사되었습니다');}).catch(fb);}else fb();function fb(){var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('링크가 복사되었습니다');}catch(e){}ta.remove();}}
function shareCard(){if(navigator.share){navigator.share({title:MEMBER.name+' 전자명함',url:location.href}).catch(function(){});}else copyLink();}

async function submitForm(type,id,btn){
 var ex=document.getElementById('ex-'+id);
 var name=(ex.querySelector('.f-name')||{}).value||'';name=name.trim();
 var phone=(ex.querySelector('.f-phone')||{}).value||'';phone=phone.trim();
 if(!name)return toast('이름을 입력하세요');if(!phone)return toast('연락처를 입력하세요');
 if(!ex.querySelector('.f-agree').checked)return toast('개인정보 동의가 필요합니다');
 var payload={이름:name,휴대폰:phone,담당자:MEMBER.name};
 var pr=ex.querySelector('.f-prod');if(pr&&pr.value)payload.제품=pr.value;
 var bi=ex.querySelector('.f-birth');if(bi&&bi.value)payload.생년월일=bi.value.trim();
 var mm=ex.querySelector('.f-memo');if(mm&&mm.value)payload.상담내용=mm.value.trim();
 var g=ex.querySelector('[data-g] .chip.on');if(g)payload.관심분야=g.getAttribute('data-v');
 var em=ex.querySelector('.f-email');if(em&&em.value)payload.이메일=em.value.trim();
 var ad=ex.querySelector('.f-addr');if(ad&&ad.value)payload.주소=ad.value.trim();
 var rf=ex.querySelector('.f-ref');if(rf&&rf.value)payload.추천인=rf.value.trim();
 var mb=ex.querySelector('.f-member');if(mb)payload.회원유형=mb.value;
 var cb=ex.querySelector('.f-combo');if(mb&&mb.value.indexOf('창업')>=0&&cb)payload.구성=cb.value;
 var py=ex.querySelector('.f-pay');if(py)payload.등록방법=py.value;
 var buys=[].slice.call(ex.querySelectorAll('[data-buy] .chip.on')).map(function(x){return x.getAttribute('data-v');});if(buys.length)payload.추가구입=buys;
 btn.disabled=true;var old=btn.textContent;btn.textContent='전송 중…';
 try{var r=await sb.from('submissions').insert({org_id:ORG.id,member_id:MEMBER.id,type:type,payload:payload});if(r.error)throw r.error;
  toast('신청이 접수되었습니다. 곧 연락드리겠습니다.');ex.querySelector('.exb').style.display='none';
 }catch(e){toast('전송 실패: '+(e.message||e));}
 btn.disabled=false;btn.textContent=old;
}
var tt;function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){t.classList.remove('show');},2400);}
init();
</script>
</body>
</html>
