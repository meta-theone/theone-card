<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#242848">
<title>내 명함 만들기</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{--bg:#EEF2F8;--card:#fff;--ink:#222640;--sub:#6A7088;--line:#E5EAF2;--navy:#242848;--blue:#3D6FB4;--blue-dark:#27548F;--soft:#EAF1F9;--danger:#C0392B;--ok:#2E8C73;}
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.55;}
  .wrap{max-width:480px;margin:0 auto;min-height:100vh;}
  .hero{background:linear-gradient(155deg,#222648,#2E4F8C 55%,#3E7AB4);color:#fff;padding:24px 22px;}
  .hero .eyebrow{font-size:11.5px;font-weight:700;opacity:.85;letter-spacing:.5px;}
  .hero h1{margin:6px 0 0;font-size:21px;letter-spacing:-.4px;}
  .hero p{margin:6px 0 0;font-size:12.5px;opacity:.9;}
  .body{padding:18px 18px 36px;}
  label.fld{display:block;margin-top:13px;}
  label.fld .l{font-size:12.5px;font-weight:700;color:#454a60;margin-bottom:5px;display:block;}
  label.fld .l .req{color:var(--danger);} label.fld .hint{font-weight:400;color:var(--sub);font-size:11px;}
  input,textarea{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px;font-size:15px;font-family:inherit;color:var(--ink);background:#fff;outline:none;}
  input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(61,111,180,.15);}
  textarea{resize:vertical;min-height:64px;}
  .photo-row{display:flex;align-items:center;gap:14px;margin-top:13px;}
  .ava{width:66px;height:66px;border-radius:18px;background:#dce6f4 center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:var(--blue-dark);font-weight:800;font-size:24px;flex:none;}
  .photo-row label{font-size:12.5px;font-weight:700;color:var(--blue-dark);border:1.5px solid var(--line);border-radius:10px;padding:9px 13px;cursor:pointer;}
  .codebox{background:#F3F8FD;border:1px solid #d9e6f4;border-radius:12px;padding:13px;margin-top:16px;}
  .btn{display:block;width:100%;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:18px;background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;box-shadow:0 8px 20px rgba(43,84,140,.25);}
  .btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line);box-shadow:none;}
  .msg{font-size:12.5px;margin-top:12px;padding:11px;border-radius:10px;display:none;}
  .msg.err{background:#fdeceb;color:var(--danger);display:block;}
  .done{text-align:center;padding:10px 4px;}
  .done .ok{width:60px;height:60px;border-radius:50%;background:#e8f5f0;color:var(--ok);display:flex;align-items:center;justify-content:center;margin:6px auto 12px;}
  .done h2{margin:0 0 4px;font-size:19px;} .done p{color:var(--sub);font-size:13px;margin:0 0 16px;}
  #qrcode{display:inline-block;padding:14px;background:#fff;border:1px solid var(--line);border-radius:16px;margin-bottom:14px;}
  .linkbox{background:#F3F8FD;border:1px solid #d9e6f4;border-radius:11px;padding:11px;font-size:12.5px;word-break:break-all;color:var(--blue-dark);font-weight:700;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:12px 20px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:.25s;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .hidden{display:none!important;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="eyebrow" id="orgEyebrow">전자명함</div>
    <h1>내 전자명함 만들기</h1>
    <p>정보를 입력하면 나만의 명함 링크와 QR이 바로 만들어집니다.</p>
  </div>
  <div class="body">
    <div id="formView">
      <form id="f" onsubmit="return false;">
        <div class="photo-row">
          <div class="ava" id="ava">사진</div>
          <label>사진 선택<input type="file" id="photo" accept="image/*" class="hidden" onchange="onPhoto(event)"></label>
        </div>
        <label class="fld"><span class="l">이름 <span class="req">*</span></span><input type="text" name="name" placeholder="홍길동"></label>
        <label class="fld"><span class="l">직책</span><input type="text" name="title" placeholder="예: 본부장"></label>
        <label class="fld"><span class="l">회사/소속</span><input type="text" name="company" placeholder="회사명 또는 소속"></label>
        <label class="fld"><span class="l">휴대폰 <span class="req">*</span></span><input type="tel" name="phone" placeholder="010-0000-0000"></label>
        <label class="fld"><span class="l">회사 전화</span><input type="tel" name="tel" placeholder="02-000-0000"></label>
        <label class="fld"><span class="l">Fax</span><input type="tel" name="fax" placeholder="02-000-0000"></label>
        <label class="fld"><span class="l">이메일</span><input type="email" name="email" placeholder="name@email.com"></label>
        <label class="fld"><span class="l">주소</span><input type="text" name="address" placeholder="사무실 주소"></label>
        <label class="fld"><span class="l">한줄 소개 <span class="hint">(선택)</span></span><textarea name="intro" placeholder="고객에게 보일 인사말"></textarea></label>
        <label class="fld"><span class="l">내 주소(영문) <span class="hint">(선택 · 비우면 자동)</span></span><input type="text" name="slug" placeholder="예: hong" autocapitalize="off"></label>
        <div class="codebox" id="codebox">
          <label class="fld" style="margin-top:0;"><span class="l">가입코드 <span class="req">*</span> <span class="hint">단체에서 받은 코드</span></span><input type="text" name="code" placeholder="가입코드 입력" autocapitalize="off"></label>
        </div>
        <button class="btn" id="submitBtn" onclick="submitCard()">명함 만들기</button>
        <div class="msg" id="msg"></div>
      </form>
    </div>
    <div id="doneView" class="hidden">
      <div class="done">
        <div class="ok"><svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
        <h2>명함이 만들어졌습니다</h2>
        <p>아래 QR·링크로 바로 공유하세요.</p>
        <div id="qrcode"></div>
        <div class="linkbox" id="linkbox"></div>
        <button class="btn" onclick="openCard()">내 명함 열기</button>
        <button class="btn ghost" onclick="copyLink()">링크 복사</button>
        <button class="btn ghost" onclick="location.reload()">새 명함 또 만들기</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var SB_URL='https://tynqmbmwvrkjzscvrree.supabase.co';
var SB_KEY='sb_publishable_4XgU_L-7zywgwRfkxtf4tQ_jMkE2Uku';
var sb=window.supabase.createClient(SB_URL,SB_KEY);
var ORG_SLUG=(new URLSearchParams(location.search).get('o'))||'scf';
var URL_CODE=(new URLSearchParams(location.search).get('code'))||'';
var PHOTO='';
var CARD_LINK='';
(async function(){
  if(URL_CODE){ var ce=document.getElementById('f').elements['code']; if(ce) ce.value=URL_CODE; var cb=document.getElementById('codebox'); if(cb) cb.classList.add('hidden'); }
  var r=await sb.from('organizations').select('name').eq('slug',ORG_SLUG).maybeSingle();
  if(r.data) document.getElementById('orgEyebrow').textContent=r.data.name+' · 전자명함';
})();
function onPhoto(e){
  var file=e.target.files[0]; if(!file) return;
  var rd=new FileReader();
  rd.onload=function(){var img=new Image();img.onload=function(){
    var s=Math.min(img.width,img.height),c=document.createElement('canvas');c.width=c.height=240;
    c.getContext('2d').drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,240,240);
    PHOTO=c.toDataURL('image/jpeg',0.82);
    var a=document.getElementById('ava');a.style.backgroundImage='url('+PHOTO+')';a.textContent='';
  };img.src=rd.result;};
  rd.readAsDataURL(file);
}
function val(n){var el=document.getElementById('f').elements[n];return el?el.value.trim():'';}
function errMsg(t){var m=document.getElementById('msg');m.textContent=t;m.className='msg err';}
async function submitCard(){
  var name=val('name'), phone=val('phone'), code=val('code')||URL_CODE;
  if(!name) return errMsg('이름을 입력하세요');
  if(!phone) return errMsg('휴대폰을 입력하세요');
  if(!code) return errMsg('가입코드를 입력하세요');
  var btn=document.getElementById('submitBtn'); btn.disabled=true; var old=btn.textContent; btn.textContent='만드는 중…';
  document.getElementById('msg').className='msg';
  var member={name:name,title:val('title'),company:val('company'),phone:phone,tel:val('tel'),fax:val('fax'),email:val('email'),address:val('address'),intro:val('intro'),slug:val('slug'),photo_url:PHOTO};
  var r=await sb.rpc('create_member',{p_org_slug:ORG_SLUG,p_join_code:code,p_member:member});
  btn.disabled=false; btn.textContent=old;
  if(r.error){
    var m=r.error.message||'';
    if(m.indexOf('가입코드')>=0) return errMsg('가입코드가 올바르지 않습니다. 단체에서 받은 코드를 확인하세요.');
    if(m.indexOf('duplicate')>=0||m.indexOf('unique')>=0||m.indexOf('members_org')>=0) return errMsg('이미 사용 중인 영문 주소입니다. 내 주소(영문)를 다르게 입력하세요.');
    return errMsg('오류: '+m);
  }
  var d=r.data||{};
  CARD_LINK=location.origin+'/v/?o='+encodeURIComponent(d.org_slug||ORG_SLUG)+'&m='+encodeURIComponent(d.slug);
  document.getElementById('formView').classList.add('hidden');
  document.getElementById('doneView').classList.remove('hidden');
  document.getElementById('linkbox').textContent=CARD_LINK;
  var box=document.getElementById('qrcode'); box.innerHTML='';
  if(window.QRCode){try{new QRCode(box,{text:CARD_LINK,width:172,height:172,correctLevel:QRCode.CorrectLevel.M});}catch(e){}}
  window.scrollTo({top:0,behavior:'smooth'});
}
function openCard(){ if(CARD_LINK) location.href=CARD_LINK; }
function copyLink(){
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(CARD_LINK).then(function(){toast('링크가 복사되었습니다');}).catch(fb); }
  else fb();
  function fb(){ var ta=document.createElement('textarea'); ta.value=CARD_LINK; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy'); toast('링크가 복사되었습니다');}catch(e){} ta.remove(); }
}
var tt;function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){t.classList.remove('show');},2000);}
</script>
</body>
</html>
